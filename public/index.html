<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auctasy - AI Fantasy Draft</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Auctasy</h1>
        <p>Intelligent Fantasy Sports Auction Platform</p>
        
        <!-- Main Options -->
        <div id="home-options" class="options-grid">
            <div class="card-button card-create" onclick="showForm('create')">
                <h2 data-icon="➕">Create Group</h2>
                <p>Start a new private auction room</p>
            </div>
            <div class="card-button card-join" onclick="showForm('join')">
                <h2 data-icon="🤝">Join Group</h2>
                <p>Enter an existing room</p>
            </div>
        </div>

        <!-- Create Form -->
        <div id="create-form-container" class="form-group hidden">
            <h2>Create a Group</h2>
            <span id="create-error" class="error-msg"></span>
            
            <label>Username</label>
            <input type="text" id="create-username" placeholder="Your name" autocomplete="off">
            
            <label>Group Name</label>
            <input type="text" id="create-groupname" placeholder="E.g., IPL Legends" autocomplete="off">
            
            <label>Max Players (Must be even, ≥4)</label>
            <input type="number" id="create-maxplayers" placeholder="4" min="4" step="2">

            <button onclick="createGroup()">Create</button>
            <button class="secondary-btn" onclick="goBack()">Cancel</button>
        </div>

        <!-- Join Form -->
        <div id="join-form-container" class="form-group hidden">
            <h2>Join a Group</h2>
            <span id="join-error" class="error-msg"></span>

            <label>Username</label>
            <input type="text" id="join-username" placeholder="Your name" autocomplete="off">
            
            <label>Group Name</label>
            <input type="text" id="join-groupname" placeholder="E.g., IPL Legends" autocomplete="off">

            <button onclick="joinGroup()">Join</button>
            <button class="secondary-btn" onclick="goBack()">Cancel</button>
        </div>

    </div>
    <script src="script.js"></script>
    <script>
        sessionStorage.clear();
    </script>
</body>
</html>
